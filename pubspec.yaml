name: flutter_log_handler
description: >
  Enterprise-grade logging solution for Flutter applications.
  Provides console logging, file persistence, crash capturing,
  Dio API interception, retention control, and a built-in
  professional log viewer UI.

version: 0.0.5

homepage: https://github.com/ASTR001/flutter_log_handler
repository: https://github.com/ASTR001/flutter_log_handler
issue_tracker: https://github.com/ASTR001/flutter_log_handler/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

topics:
  - logging
  - logger
  - debugging
  - monitoring
  - crash-reporting

dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.3
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  dio: ^5.9.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

platforms:
  android:
  ios:
  macos:
  windows:
  linux:
